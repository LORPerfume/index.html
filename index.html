<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOR Perfume Store</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
  }

  header {
    background: black;
    color: white;
    padding: 20px;
    text-align: center;
    position: sticky;
    top: 0;
  }

  .logo {
    width: 150px;
    margin: 20px auto;
    display: block;
  }

  /* المنتجات */
  .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: white;
    width: 280px;
    border-radius: 15px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-5px);
  }

  .card img {
    width: 100%;
    border-radius: 12px;
  }

  .title {
    font-size: 18px;
    font-weight: bold;
    margin-top: 10px;
  }

  .desc {
    color: gray;
    font-size: 14px;
    margin-bottom: 10px;
  }

  /* أزرار */
  .btn {
    display: block;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    margin-top: 8px;
    font-weight: bold;
    cursor: pointer;
  }

  .whatsapp { background: #25D366; }
  .cart { background: #111; }
  .instagram { background: #E1306C; margin: 20px auto; width: 200px; }

  /* السلة */
  .cart-box {
    position: fixed;
    right: 15px;
    bottom: 15px;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    width: 220px;
  }

  .cart-box h3 {
    margin: 0 0 10px;
  }

  .cart-item {
    font-size: 14px;
    margin-bottom: 5px;
  }
</style>
</head>

<body>

<header>
  <h1>LOR Perfume Luxury Store</h1>
</header>

<img class="logo" src="logo.png" alt="Logo">

<!-- إنستقرام -->
<a class="btn instagram"
   href="https://www.instagram.com/lorperfumejordan?igsh=ZnhpODdhNGZ0a3pw"
   target="_blank">
   Instagram
</a>

<div class="container">

  <!-- منتج -->
  <div class="card">
    <img src="product.jpg" alt="Product">

    <div class="title">Luxury Butter Perfume</div>
    <div class="desc">Eau de Parfum - 1.01 FL.OZ</div>

    <!-- Add to Cart -->
    <button class="btn cart" onclick="addToCart('Luxury Butter Perfume')">
      Add to Cart
    </button>

    <!-- WhatsApp -->
    <a class="btn whatsapp"
       href="https://wa.me/962787727783?text=I%20want%20to%20buy%20Luxury%20Butter%20Perfume"
       target="_blank">
      Buy on WhatsApp
    </a>
  </div>

</div>

<!-- سلة مشتريات -->
<div class="cart-box">
  <h3>Cart 🛒</h3>
  <div id="cartItems"></div>
</div>

<script>
let cart = [];

function addToCart(product) {
  cart.push(product);
  updateCart();
}

function updateCart() {
  let cartDiv = document.getElementById("cartItems");
  cartDiv.innerHTML = "";

  cart.forEach((item, index) => {
    cartDiv.innerHTML += "<div class='cart-item'>• " + item + "</div>";
  });
}
</script>

</body>
</html>
