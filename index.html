<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOR Perfume</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    header {
      background: black;
      color: white;
      padding: 20px;
    }

    .logo {
      width: 160px;
      margin-top: 20px;
    }

    .container {
      padding: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: white;
      width: 280px;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .title {
      font-size: 18px;
      margin-top: 10px;
      font-weight: bold;
    }

    .desc {
      color: gray;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <h1>LOR Perfume</h1>
  </header>

  <!-- اللوجو -->
  <img class="logo" src="logo.png.jpeg" alt="Logo">

  <div class="container">

    <!-- منتج -->
    <div class="card">
      <img src="product.jpg.jpeg" alt="Product">
      <div class="title">Luxury Butter Perfume</div>
      <div class="desc">Eau de Parfum - 1.01 FL.OZ</div>
    </div>

  </div>

</body>
</html>
